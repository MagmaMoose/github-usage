{{- if .Values.externalSecret.enabled -}}
# Projects the app's secret env vars (App private key, PAT, DB DSN, webhook URLs,
# SMTP password) from an external store into the Secret the Deployment consumes.
# Uses the stable external-secrets.io/v1 API (GA since ESO v0.14). Override
# externalSecret.apiVersion only for clusters on an older operator.
apiVersion: {{ .Values.externalSecret.apiVersion | default "external-secrets.io/v1" }}
kind: ExternalSecret
metadata:
  name: {{ include "gud.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gud.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "gud.fullname" . }}-env
    creationPolicy: Owner
    template:
      type: Opaque
  {{- with .Values.externalSecret.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}
