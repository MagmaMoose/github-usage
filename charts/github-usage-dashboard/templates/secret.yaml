{{- if eq (include "gud.managedSecret" .) "true" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gud.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gud.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- with .Values.database.url }}
  DATABASE_URL: {{ . | quote }}
  {{- end }}
{{- end -}}
