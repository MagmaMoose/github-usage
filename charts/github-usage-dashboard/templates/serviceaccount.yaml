# e84eaf4d — informational "namespaces in use" query fires simply because we set
# metadata.namespace (which the namespace-undefined rule asked for); not a vuln.
# kics-scan disable=e84eaf4d-2f45-47b2-abe8-e581b06deb66
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gud.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gud.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end -}}
